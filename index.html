<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>GymRest Automatico</title>
    <style>
        :root { --primary: #00ff88; --secondary: #00e5ff; --bg: #121212; }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            user-select: none;
        }
        .setup-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        input { 
            width: 70px; padding: 12px; border-radius: 12px; border: 1px solid #444; 
            background: #222; color: white; text-align: center; font-size: 1.3rem;
        }
        label { font-size: 0.8rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .timer-display { font-size: 9rem; font-weight: 800; color: var(--primary); margin: 5px 0; font-variant-numeric: tabular-nums; }
        .active-a { color: var(--primary); text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .active-b { color: var(--secondary); text-shadow: 0 0 20px rgba(0,229,255,0.3); }
        
        .controls { display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 400px; }
        button { padding: 22px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 18px; cursor: pointer; text-transform: uppercase; }
        .btn-start { background-color: var(--primary); color: black; }
        .btn-stop { background-color: #ff4444; color: white; }
        .status { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; height: 1.5rem; }
    </style>
</head>
<body>

    <div class="setup-container">
        <div class="input-group">
            <label>Timer A</label>
            <input type="number" id="timeA" value="30" oninput="updateInitialTime()">
        </div>
        <div class="input-group">
            <label>Timer B</label>
            <input type="number" id="timeB" value="60" oninput="updateInitialTime()">
        </div>
    </div>

    <div id="statusText" class="status">PRONTO: TIMER A</div>
    <div id="timer" class="timer-display active-a">30</div>

    <div class="controls">
        <button class="btn-start" onclick="toggleTimer()" id="mainBtn">AVVIA ALLENAMENTO</button>
        <button style="background:#333; color:white; padding: 15px;" onclick="resetTimer()">RESET</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <script>
        let timeLeft = 30;
        let timerId = null;
        let isRunning = false;
        let currentMode = 'A'; 
        const noSleep = new NoSleep();

        // Funzione per aggiornare il display mentre l'utente scrive
        function updateInitialTime() {
            if (!isRunning) {
                const valA = parseInt(document.getElementById('timeA').value) || 0;
                const valB = parseInt(document.getElementById('timeB').value) || 0;
                timeLeft = (currentMode === 'A') ? valA : valB;
                document.getElementById('timer').innerText = timeLeft;
            }
        }

        function toggleTimer() {
            if (!isRunning) {
                startLogic();
            } else {
                stopTimer();
            }
        }

        function startLogic() {
            isRunning = true;
            noSleep.enable();
            document.getElementById('mainBtn').innerText = "STOP";
            document.getElementById('mainBtn').className = "btn-stop";
            document.getElementById('statusText').innerText = "RECUPERO " + currentMode + "...";
            
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    switchMode();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerId);
            isRunning = false;
            noSleep.disable();
            document.getElementById('mainBtn').innerText = "RIPRENDI";
            document.getElementById('mainBtn').className = "btn-start";
            document.getElementById('statusText').innerText = "IN PAUSA";
        }

        function switchMode() {
            suona();
            const valA = parseInt(document.getElementById('timeA').value) || 0;
            const valB = parseInt(document.getElementById('timeB').value) || 0;

            if (currentMode === 'A') {
                currentMode = 'B';
                timeLeft = valB;
                document.getElementById('timer').className = "timer-display active-b";
            } else {
                currentMode = 'A';
                timeLeft = valA;
                document.getElementById('timer').className = "timer-display active-a";
            }

            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('statusText').innerText = "AUTO-START " + currentMode;
            
            // Riparte automaticamente
            startLogic();
        }

        function suona() {
            if (navigator.vibrate) navigator.vibrate([400, 100, 400]);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function resetTimer() {
            stopTimer();
            currentMode = 'A';
            const valA = parseInt(document.getElementById('timeA').value) || 30;
            timeLeft = valA;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('timer').className = "timer-display active-a";
            document.getElementById('statusText').innerText = "PRONTO: TIMER A";
            document.getElementById('mainBtn').innerText = "AVVIA ALLENAMENTO";
            document.getElementById('mainBtn').className = "btn-start";
        }
    </script>
</body>
</html>
