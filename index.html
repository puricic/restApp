<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GymRest">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>GymRest Ultra Pro</title>
    <style>
        :root { --timer-a: #00ff88; --timer-b: #ff9500; --bg: #121212; }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            user-select: none; touch-action: manipulation; overflow: hidden;
        }
        .setup-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        input { 
            width: 65px; padding: 12px; border-radius: 12px; border: 1px solid #444; 
            background: #222; color: white; text-align: center; font-size: 1.2rem;
        }
        label { font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .timer-display { font-size: 9rem; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; transition: color 0.3s; }
        .active-a { color: var(--timer-a); text-shadow: 0 0 30px rgba(0,255,136,0.2); }
        .active-b { color: var(--timer-b); text-shadow: 0 0 30px rgba(255,149,0,0.2); }
        
        .rounds-display { font-size: 1.8rem; color: #aaa; margin-bottom: 10px; }
        .rounds-display span { color: white; font-weight: bold; border-bottom: 2px solid white; }

        .controls { display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 400px; }
        button { padding: 22px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; text-transform: uppercase; transition: opacity 0.2s; }
        .btn-start { background-color: white; color: black; }
        .btn-stop { background-color: #ff3b30; color: white; }
        .status { font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 5px; height: 1.5rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div class="setup-container">
        <div class="input-group">
            <label>Timer A (s)</label>
            <input type="number" id="timeA" value="30" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>Timer B (s)</label>
            <input type="number" id="timeB" value="60" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>Serie Totali</label>
            <input type="number" id="totalRounds" value="4" oninput="updateUI()">
        </div>
    </div>

    <div id="statusText" class="status">PRONTO</div>
    <div id="roundText" class="rounds-display">Serie <span id="currentRoundSpan">1</span> di <span id="totalRoundSpan">4</span></div>
    <div id="timer" class="timer-display active-a">30</div>

    <div class="controls">
        <button class="btn-start" onclick="toggleTimer()" id="mainBtn">AVVIA</button>
        <button style="background:#222; color:#888; padding: 10px; font-size: 0.8rem;" onclick="resetTimer()">RESET</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <script>
        let timeLeft = 30;
        let timerId = null;
        let isRunning = false;
        let currentMode = 'A'; 
        let currentRound = 1;
        let audioCtx = null;
        const noSleep = new NoSleep();

        // Funzione per inizializzare l'audio su iOS (deve essere chiamata da un tocco utente)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start(0);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function updateUI() {
            const valA = parseInt(document.getElementById('timeA').value) || 0;
            const valB = parseInt(document.getElementById('timeB').value) || 0;
            const totalR = parseInt(document.getElementById('totalRounds').value) || 1;

            if (!isRunning) {
                timeLeft = (currentMode === 'A') ? valA : valB;
                document.getElementById('timer').innerText = timeLeft;
            }
            
            document.getElementById('currentRoundSpan').innerText = currentRound;
            document.getElementById('totalRoundSpan').innerText = totalR;
        }

        function toggleTimer() {
            initAudio(); // Sblocca audio su iPhone al click
            if (!isRunning) {
                startLogic();
            } else {
                stopTimer();
            }
        }

        function startLogic() {
            isRunning = true;
            noSleep.enable();
            document.getElementById('mainBtn').innerText = "PAUSA";
            document.getElementById('mainBtn').className = "btn-stop";
            document.getElementById('statusText').innerText = "RECUPERO " + currentMode;
            
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    handleTransition();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerId);
            isRunning = false;
            noSleep.disable();
            document.getElementById('mainBtn').innerText = "RIPRENDI";
            document.getElementById('mainBtn').className = "btn-start";
            document.getElementById('statusText').innerText = "IN PAUSA";
        }

        function handleTransition() {
            const totalR = parseInt(document.getElementById('totalRounds').value) || 1;
            const valA = parseInt(document.getElementById('timeA').value) || 0;
            const valB = parseInt(document.getElementById('timeB').value) || 0;

            playTripleBeep();

            if (currentMode === 'A') {
                currentMode = 'B';
                timeLeft = valB;
                document.getElementById('timer').className = "timer-display active-b";
                startLogic();
            } else {
                if (currentRound < totalR) {
                    currentRound++;
                    currentMode = 'A';
                    timeLeft = valA;
                    document.getElementById('timer').className = "timer-display active-a";
                    updateUI();
                    startLogic();
                } else {
                    finishWorkout();
                }
            }
        }

        function playTripleBeep() {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
            
            if (!audioCtx) initAudio();

            function beep(freq, start) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g);
                g.connect(audioCtx.destination);
                osc.frequency.value = freq;
                g.gain.setValueAtTime(0.2, start);
                g.gain.exponentialRampToValueAtTime(0.0001, start + 0.15);
                osc.start(start);
                osc.stop(start + 0.15);
            }

            const now = audioCtx.currentTime;
            beep(700, now);
            beep(700, now + 0.2);
            beep(1400, now + 0.4);
        }

        function finishWorkout() {
            isRunning = false;
            noSleep.disable();
            document.getElementById('statusText').innerText = "FINITO! 🎉";
            document.getElementById('mainBtn').innerText = "RIFAI";
            document.getElementById('mainBtn').className = "btn-start";
            currentRound = 1;
            currentMode = 'A';
            updateUI();
        }

        function resetTimer() {
            stopTimer();
            currentRound = 1;
            currentMode = 'A';
            document.getElementById('timer').className = "timer-display active-a";
            updateUI();
            document.getElementById('statusText').innerText = "PRONTO";
            document.getElementById('mainBtn').innerText = "AVVIA";
            document.getElementById('mainBtn').className = "btn-start";
        }
        
        updateUI();
    </script>
</body>
</html>
